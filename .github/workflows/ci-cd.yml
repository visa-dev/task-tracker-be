name: Backend CI/CD

on:
  push:
    branches: ["main"]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

# -------------------------
# 1. BUILD + TEST + SONAR
# -------------------------
jobs:
  build-test-sonar:
    name: Build, Test & Sonar Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      # Single build (test + coverage)
      - name: Build & Test
        run: mvn -B clean verify -Dspring.profiles.active=test

      # -------------------------
      # SONARCLOUD
      # -------------------------
      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
        run: |
          mvn -B sonar:sonar \
            -Dsonar.host.url=$SONAR_HOST_URL \
            -Dsonar.organization=$SONAR_ORGANIZATION \
            -Dsonar.projectKey=$SONAR_PROJECT_KEY \
            -Dsonar.token=$SONAR_TOKEN

# -------------------------
# 2. DOCKER BUILD + PUSH
# -------------------------
  docker-build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build-test-sonar

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # -------------------------
      # DEBUG: verify AWS secrets are actually populated
      # before configure-aws-credentials runs.
      # Remove this step once the pipeline is confirmed working.
      # -------------------------
      - name: Debug AWS secret presence
        run: |
          echo "AWS_REGION value: '$AWS_REGION'"
          echo "AWS_ACCOUNT_ID length: ${#AWS_ACCOUNT_ID}"
          echo "Access key length: ${#AWS_ACCESS_KEY_ID}"
          echo "Access key prefix: ${AWS_ACCESS_KEY_ID:0:4}"
          echo "Secret key length: ${#AWS_SECRET_ACCESS_KEY}"
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} \
          | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Build Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}

          docker build -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG .
          docker tag ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG \
                      ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Push Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}

          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

# -------------------------
# 3. DEPLOY TO EC2
# -------------------------
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: docker-build-push

    steps:
      # -------------------------
      # DEBUG: verify EC2/SSH secrets are populated
      # before the ssh-action runs.
      # Remove this step once the pipeline is confirmed working.
      # -------------------------
      - name: Debug EC2 secret presence
        run: |
          echo "EC2_HOST value: '$EC2_HOST'"
          echo "EC2_USER value: '$EC2_USER'"
          echo "EC2_SSH_KEY length: ${#EC2_SSH_KEY}"
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_REGION,ECR_REGISTRY,ECR_REPOSITORY
          script: |
            set -e

            aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "$ECR_REGISTRY"

            docker pull "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

            docker stop task-tracker-backend || true
            docker rm task-tracker-backend || true

            docker run -d \
              --name task-tracker-backend \
              --restart unless-stopped \
              -p 8080:8080 \
              -v /home/${{ secrets.EC2_USER }}/logs:/app/logs \
              --env-file /home/${{ secrets.EC2_USER }}/task-tracker.env \
              "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

            docker image prune -f