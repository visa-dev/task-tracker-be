# Activate with SPRING_PROFILES_ACTIVE=prod. Logging levels and file routing (one rolling
# file per service under LOG_PATH, plus a dedicated error.log) are configured entirely in
# logback-spring.xml - kept out of this file to avoid two conflicting sources of truth.
# LOG_PATH env var controls the log directory (default ./logs).

spring.jpa.show-sql=false

# ddl-auto=update is convenience-friendly for this assignment; a real production deployment
# should switch to 'validate' and manage schema changes via Flyway/Liquibase migrations
# (see README "Future Improvements").
spring.jpa.hibernate.ddl-auto=update
