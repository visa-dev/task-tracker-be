spring.application.name=task-tracker

# No profile active by default -> runs like 'dev' (see application-dev.properties for the
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# --- Database (MySQL / AWS RDS) ---
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:task_tracker_db}?useSSL=${DB_USE_SSL:false}&sslMode=${DB_SSL_MODE:DISABLED}&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Viraj11836++}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# --- JWT ---
# IMPORTANT: override this in production via env var APP_JWT_SECRET (min 32 chars for HS256)
app.jwt.secret=${APP_JWT_SECRET:vLk9Pq2nR7XbY4sF8mH1Jw3Nz6QaUd5Te0CrAi9MoEpKvGxLc2HuSb7WiDfYn84R}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:3600000}

# --- CORS ---
# Comma-separated list of allowed frontend origins - set to your Vercel URL(s) in production.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# --- Default Admin Seeding ---
app.admin.username=${APP_ADMIN_USERNAME:admin}
app.admin.password=${APP_ADMIN_PASSWORD:Admin@123}

# --- Server ---
server.port=${SERVER_PORT:8080}

# --- Actuator (health checks for EC2 / load balancer / Docker HEALTHCHECK) ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoints.web.base-path=/actuator
